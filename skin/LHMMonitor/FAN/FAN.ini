; Lines starting ; (semicolons) are commented out.
; That is, they do not affect the code and are here for demonstration purposes only.
; ----------------------------------

[Rainmeter]
; This section contains general settings that can be used to change how Rainmeter behaves.
Update=1000

[Metadata]
; Contains basic information of the skin.
Name=LHMMonitor FAN
Author=TwilightApteryx
Information=Display FAN Information.
License=
Version=1.0.0

[Variables]
; Variables declared here can be used later on between two # characters (e.g. #MyVariable#).
FontFace=Consolas
RootX=10
Sub1X=15

; ----------------------------------
; STYLES are used to "centralize" options
; ----------------------------------

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,200,190 | Fill Color 0,0,0,220 | StrokeWidth 0
DynamicVariables=1

[MeterStyleTitle]
FontFace=#FontFace#
FontColor=255,200,0
FontSize=10
FontWeight=700
AntiAlias=1

[MeterStyleData]
FontFace=#FontFace#
FontColor=255,255,255
FontSize=8
AntiAlias=1

[MeterStyleDataSub1]
FontColor=220,220,220

[MeterStyleBar]
BarColor=0,200,0
SolidColor=0,200,0,150
BarOrientation=Horizontal

[MeterStyleBaseLabelPos]
X=10
Y=40
W=180
H=14

[MeterStyleBaseValuePos]
X=190
Y=0r
W=180
H=14

[MeterStyleBaseBarPos]
X=12
Y=12r
W=177
H=2

; ----------------------------------
; MEASURES return some kind of value
; ----------------------------------

[MeasureFan1]
Measure=Plugin
Plugin=LHMMonitor.dll
HardwareName=Nuvoton NCT6799D
SensorType=Fan
SensorName=Fan #1
MaxValue=3000
[MeasureFan2]
Measure=Plugin
Plugin=LHMMonitor.dll
HardwareName=Nuvoton NCT6799D
SensorType=Fan
SensorName=Fan #2
MaxValue=3000
