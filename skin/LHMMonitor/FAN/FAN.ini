SensorName=Fan #7
MaxValue=3000

; ----------------------------------
; METERS display images, text, bars, etc.
; ----------------------------------

[MeterTitle]
Meter=String
MeterStyle=MeterStyleTitle
X=10
Y=10
Text=Nuvoton NCT6799D

; FAN 1
[MeterLabelFAN1]
Meter=String
MeterStyle=MeterStyleData | MeterStyleBaseLabelPos
X=15
Y=40
Text=FAN #1

[MeterValueFAN1]
Meter=String
MeterStyle=MeterStyleData | MeterStyleBaseValuePos
MeasureName=MeasureFAN1
StringAlign=Right
Text=%1 RPM

[MeterBarFAN#1]
Meter=Bar
MeterStyle=MeterStyleBar | MeterStyleBaseBarPos
MeasureName=MeasureFAN1

