; ----------------------------------
; METERS display images, text, bars, etc.
; ----------------------------------

[MeterTitle]
Meter=String
MeterStyle=MeterStyleTitle
X=10
Y=10
Text=AMD Ryzen 5 9600X

; CPU Load
[MeterLabelCPULoad]
Meter=String
MeterStyle=MeterStyleData | MeterStyleBaseLabelPos
Y=40
Text=CPU Load

[MeterValueCPULoad]
Meter=String
MeterStyle=MeterStyleData | MeterStyleBaseValuePos
MeasureName=MeasureCPULoad
StringAlign=Right
Text=%1%
NumOfDecimals=2

[MeterBarCPULoad]
Meter=Bar
MeterStyle=MeterStyleBar | MeterStyleBaseBarPos
MeasureName=MeasureCPULoad

; CPU Core Temp
[MeterLabelCPUCoreTemp]
