HardwareName=Nuvoton NCT6799D
SensorType=Temperature
SensorName=Temperature #4
[MeasureCPUCoreTemp5]
Measure=Plugin
Plugin=LHMMonitor.dll
HardwareName=Nuvoton NCT6799D
SensorType=Temperature
SensorName=Temperature #5
[MeasureCPUCoreTemp6]
Measure=Plugin
Plugin=LHMMonitor.dll
HardwareName=Nuvoton NCT6799D
SensorType=Temperature
SensorName=Temperature #6

[MeasureCPUCoreTempBarColorChanger]
Measure=Calc
Formula=(MeasureCPUCoreTemp < #SafeTemp# ? -1 : (MeasureCPUCoreTemp < #WarnTemp# ? 1 : 2))  
IfBelowValue=0
IfBelowAction=!SetOption MeterBarCPUCoreTemp BarColor #BarColorTempSafe#
ifEqualValue=1
IfEqualAction=!SetOption MeterBarCPUCoreTemp BarColor #BarColorTempWarn#
IfAboveValue=1
IfAboveAction=!SetOption MeterBarCPUCoreTemp BarColor #BarColorTempDang#
